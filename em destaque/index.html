<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Em Destaque</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <nav class="navbar">
      <div class="logo">MegaStore</div>
      <ul class="nav-links">
        <li><a href="#">Início</a></li>
        <li><a href="#">Produtos</a></li>
        <li><a href="#featured" class="active">Em destaque</a></li>
        <li><a href="#">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="featured" class="featured-section">
      <h2 class="section-title">Em Destaque</h2>

      <div class="filters">
        <input
          type="text"
          id="filterName"
          placeholder="Filtrar por nome..."
          oninput="applyFilters()"
        />
        <input
          type="number"
          id="filterMaxPrice"
          placeholder="Preço máximo (R$)"
          oninput="applyFilters()"
        />
        <button onclick="clearFilters()">Limpar filtros</button>
      </div>

      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>Carregando produtos...</p>
      </div>

      <div id="errorMsg" class="error-msg hidden"></div>

      <div id="featuredProducts" class="products-grid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
